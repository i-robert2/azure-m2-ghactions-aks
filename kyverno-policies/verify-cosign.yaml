apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
spec:
  validationFailureAction: Enforce
  webhookTimeoutSeconds: 30
  background: false
  rules:
    - name: verify-cosign-keyless
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app]
      verifyImages:
        - imageReferences:
            - "*"
          imageRegistryCredentials:
            allowInsecureRegistry: false
            secrets:
              - kyverno-acr
          attestors:
            - count: 1
              entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subject: "https://github.com/i-robert2/azure-m2-ghactions-aks/.github/workflows/cd.yml@refs/heads/main"
                    rekor:
                      url: https://rekor.sigstore.dev
